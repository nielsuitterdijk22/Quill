# Quill local development stack.
#
#   docker compose -f deploy/compose/docker-compose.yml up -d --build
#
# Services:
#   postgres  5432  metadata for Quill + Forgejo (separate databases)
#   forgejo   3000  git backend that Quill wraps via REST (SSH on 2222)
#   api       8080  Quill Go backend
#   dispatch  8090  Pipeline dispatcher + Docker-backed runner
#   web       3001  Quill Next.js frontend
#   caddy     80/443  Reverse proxy (production profile only)
#
# After first boot run `make provision` to create the Forgejo admin account and
# generate QUILL_FORGEJO_ADMIN_TOKEN automatically — see deploy/compose/README.md.
#
# Production: add --profile production to enable the Caddy reverse proxy.

name: quill

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quill}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quill}
      POSTGRES_DB: ${POSTGRES_DB:-quill}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quill}"]
      interval: 5s
      timeout: 5s
      retries: 12

  forgejo:
    image: codeberg.org/forgejo/forgejo:15
    restart: unless-stopped
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: postgres:5432
      FORGEJO__database__NAME: forgejo
      FORGEJO__database__USER: ${POSTGRES_USER:-quill}
      FORGEJO__database__PASSWD: ${POSTGRES_PASSWORD:-quill}
      FORGEJO__server__DOMAIN: ${FORGEJO_DOMAIN:-localhost}
      FORGEJO__server__ROOT_URL: ${FORGEJO_ROOT_URL:-http://localhost:3000/}
      FORGEJO__server__SSH_DOMAIN: ${FORGEJO_SSH_DOMAIN:-localhost}
      FORGEJO__server__SSH_PORT: "2222"
      FORGEJO__security__INSTALL_LOCK: "true"
      # Quill provisions accounts via the admin API, so self-service signup is off.
      FORGEJO__service__DISABLE_REGISTRATION: "true"
      # Allow Forgejo webhooks to reach the Quill api service on the compose network.
      FORGEJO__webhook__ALLOWED_HOST_LIST: "*"
    ports:
      - "3000:3000"
      - "2222:2222"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - forgejo-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ../../backend
    restart: unless-stopped
    environment:
      QUILL_ENV: ${QUILL_ENV:-development}
      QUILL_HTTP_ADDR: ":8080"
      QUILL_LOG_FORMAT: text
      QUILL_DATABASE_URL: postgres://${POSTGRES_USER:-quill}:${POSTGRES_PASSWORD:-quill}@postgres:5432/${POSTGRES_DB:-quill}?sslmode=disable
      QUILL_FORGEJO_BASE_URL: http://forgejo:3000
      QUILL_FORGEJO_ADMIN_TOKEN: ${QUILL_FORGEJO_ADMIN_TOKEN:-}
      QUILL_FORGEJO_PUBLIC_URL: ${QUILL_FORGEJO_PUBLIC_URL:-}
      QUILL_JWT_SECRET: ${QUILL_JWT_SECRET:-dev-insecure-secret-change-me}
      QUILL_CORS_ALLOWED_ORIGINS: ${QUILL_CORS_ALLOWED_ORIGINS:-http://localhost:3001}
      # Auth provider: "clerk" (default) or "zitadel". The matching settings below
      # must be populated for the selected provider.
      QUILL_AUTH_PROVIDER: ${QUILL_AUTH_PROVIDER:-clerk}
      QUILL_CLERK_FRONTEND_API: ${QUILL_CLERK_FRONTEND_API:-}
      QUILL_CLERK_SECRET_KEY: ${QUILL_CLERK_SECRET_KEY:-}
      QUILL_ZITADEL_ISSUER: ${QUILL_ZITADEL_ISSUER:-}
      QUILL_ZITADEL_MANAGEMENT_TOKEN: ${QUILL_ZITADEL_MANAGEMENT_TOKEN:-}
      QUILL_GITHUB_CLIENT_ID: ${QUILL_GITHUB_CLIENT_ID:-}
      QUILL_GITHUB_CLIENT_SECRET: ${QUILL_GITHUB_CLIENT_SECRET:-}
      QUILL_PIPELINE_DISPATCH_URL: http://dispatch:8090
      QUILL_PIPELINE_DISPATCH_SECRET: ${QUILL_PIPELINE_DISPATCH_SECRET:-dev-dispatch-secret}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      forgejo:
        condition: service_healthy
      dispatch:
        condition: service_started

  dispatch:
    build:
      context: ../../backend
    command: ["/quill-dispatch"]
    restart: unless-stopped
    # The dispatcher runs nektos/act and is the only Quill service that needs
    # Docker daemon access for local job containers.
    user: "0:0"
    environment:
      QUILL_ENV: ${QUILL_ENV:-development}
      QUILL_HTTP_ADDR: ":8090"
      QUILL_LOG_FORMAT: text
      QUILL_PIPELINE_DISPATCH_SECRET: ${QUILL_PIPELINE_DISPATCH_SECRET:-dev-dispatch-secret}
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      forgejo:
        condition: service_healthy

  web:
    restart: unless-stopped
    build:
      context: ../../frontend
      args:
        # NEXT_PUBLIC_* must be build args — Next.js inlines them at build time.
        NEXT_PUBLIC_AUTH_PROVIDER: ${NEXT_PUBLIC_AUTH_PROVIDER:-clerk}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_ZITADEL_ISSUER: ${NEXT_PUBLIC_ZITADEL_ISSUER:-}
        NEXT_PUBLIC_ZITADEL_CLIENT_ID: ${NEXT_PUBLIC_ZITADEL_CLIENT_ID:-}
        NEXT_PUBLIC_ZITADEL_PROJECT_ID: ${NEXT_PUBLIC_ZITADEL_PROJECT_ID:-}
        QUILL_API_BASE_URL: ${QUILL_API_BASE_URL:-http://api:8080}
        # Sibling app URLs for the top-left app switcher (client-inlined, so build args).
        NEXT_PUBLIC_ATLAS_URL: ${NEXT_PUBLIC_ATLAS_URL:-}
        NEXT_PUBLIC_TEMPO_URL: ${NEXT_PUBLIC_TEMPO_URL:-}
        NEXT_PUBLIC_FORGE_URL: ${NEXT_PUBLIC_FORGE_URL:-}
    environment:
      NODE_ENV: production
      QUILL_API_BASE_URL: http://api:8080
      # Auth provider: "clerk" (default) or "zitadel".
      NEXT_PUBLIC_AUTH_PROVIDER: ${NEXT_PUBLIC_AUTH_PROVIDER:-clerk}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      # Zitadel (Auth.js). Client is a public PKCE app — no secret.
      NEXT_PUBLIC_ZITADEL_ISSUER: ${NEXT_PUBLIC_ZITADEL_ISSUER:-}
      NEXT_PUBLIC_ZITADEL_CLIENT_ID: ${NEXT_PUBLIC_ZITADEL_CLIENT_ID:-}
      NEXT_PUBLIC_ZITADEL_PROJECT_ID: ${NEXT_PUBLIC_ZITADEL_PROJECT_ID:-}
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_URL: ${AUTH_URL:-}
    ports:
      - "3001:3001"
    depends_on:
      - api

  # Zitadel: self-hosted OIDC IdP, an alternative to Clerk for org management +
  # SSO/SCIM. Behind the "zitadel" profile so the default stack is unchanged:
  #   docker compose --profile zitadel up -d
  # Then set QUILL_AUTH_PROVIDER=zitadel (api) and NEXT_PUBLIC_AUTH_PROVIDER=zitadel
  # (web), plus the Zitadel issuer/client env above. See deploy/compose/README.md.
  zitadel-db:
    image: postgres:16-alpine
    profiles: [zitadel]
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${ZITADEL_DB_PASSWORD:-postgres}
      POSTGRES_DB: zitadel
    volumes:
      - zitadel-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zitadel"]
      interval: 5s
      timeout: 5s
      retries: 20

  # The Zitadel image runs as a non-root user that can't write to the bind-mounted
  # ./zitadel/out (owned by the host user), so FirstInstance's PatPath write fails.
  # This init step makes it world-writable before Zitadel boots — runs to
  # completion, then Zitadel starts (depends_on: service_completed_successfully).
  zitadel-init:
    image: alpine:3
    profiles: [zitadel]
    command: ["sh", "-c", "chmod 0777 /output"]
    volumes:
      - ./zitadel/out:/output

  zitadel:
    image: ghcr.io/zitadel/zitadel:v2.65.1
    profiles: [zitadel]
    restart: unless-stopped
    # FirstInstance bootstrap (admin login + machine PAT) comes from steps.yaml,
    # mounted below; the PAT is written to the ./zitadel/out bind mount for
    # bootstrap.sh. Set ZITADEL_MASTERKEY (exactly 32 chars) in production.
    command: >
      start-from-init
      --masterkey "${ZITADEL_MASTERKEY:-MasterkeyNeedsToHave32Characters}"
      --tlsMode ${ZITADEL_TLS_MODE:-external}
      --steps /steps.yaml
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-db
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_USER_PASSWORD:-zitadel}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${ZITADEL_DB_PASSWORD:-postgres}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      # External exposure. ZITADEL_EXTERNALDOMAIN MUST be set to the public host
      # (e.g. auth.example.com) BEFORE first boot — the instance domain is baked
      # in at init and cannot be changed later without re-initialising. Caddy
      # terminates TLS, so ExternalSecure stays true and ZITADEL serves h2c.
      ZITADEL_EXTERNALSECURE: ${ZITADEL_EXTERNALSECURE:-true}
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_EXTERNALDOMAIN:-localhost}
      ZITADEL_EXTERNALPORT: ${ZITADEL_EXTERNALPORT:-443}
    volumes:
      - ./zitadel/steps.yaml:/steps.yaml:ro
      - ./zitadel/out:/output
    # Bound to localhost only: external traffic reaches Zitadel through Caddy
    # (auth.<domain>); the local port is for bootstrap.sh / debugging on the host.
    ports:
      - "127.0.0.1:${ZITADEL_PORT:-8081}:8080"
    depends_on:
      zitadel-db:
        condition: service_healthy
      zitadel-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 5s
      timeout: 5s
      retries: 40

  caddy:
    image: caddy:2-alpine
    profiles: [production]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      QUILL_DOMAIN: ${QUILL_DOMAIN}
      # Public host for the Zitadel vhost — same value Zitadel is initialised with.
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_EXTERNALDOMAIN:-auth.localhost}
    depends_on:
      - web
      - forgejo
    restart: unless-stopped

volumes:
  pgdata:
  forgejo-data:
  caddy-data:
  caddy-config:
  zitadel-pgdata:
